<?xml version="1.0" encoding="UTF-8"?>
<!-- Old-Spain editorial rosette ornament. Used as section divider /
     marginalia. Gold + terracotta on cream. Inline-editable. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Koristekuvio">
  <g transform="translate(40 40)">
    <circle r="30" fill="none" stroke="#c79046" stroke-width="1"/>
    <circle r="22" fill="none" stroke="#c79046" stroke-width="0.8" opacity="0.6"/>
    <g fill="#a13b2e">
      <path d="M 0 -28 q 6 8 0 16 q -6 -8 0 -16 z"/>
      <path d="M 0 -28 q 6 8 0 16 q -6 -8 0 -16 z" transform="rotate(60)"/>
      <path d="M 0 -28 q 6 8 0 16 q -6 -8 0 -16 z" transform="rotate(120)"/>
      <path d="M 0 -28 q 6 8 0 16 q -6 -8 0 -16 z" transform="rotate(180)"/>
      <path d="M 0 -28 q 6 8 0 16 q -6 -8 0 -16 z" transform="rotate(240)"/>
      <path d="M 0 -28 q 6 8 0 16 q -6 -8 0 -16 z" transform="rotate(300)"/>
    </g>
    <circle r="4" fill="#c79046"/>
  </g>
</svg>
