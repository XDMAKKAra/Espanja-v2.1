<?xml version="1.0" encoding="UTF-8"?>
<!--
  Puheo Ship 1.5 — Marginalia: quill + inkwell. Old-Spain palette.
  Used as accent next to writing/proof sections. Editable hex tokens.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" role="img" aria-label="Kynä ja mustepullo">
  <!-- Inkwell base -->
  <ellipse cx="80" cy="200" rx="58" ry="14" fill="#c79046" opacity="0.25"/>
  <path d="M 36 198 q 0 -52 44 -52 t 44 52 z" fill="#1d1611"/>
  <path d="M 36 198 q 0 -52 44 -52 t 44 52 v 6 q -6 4 -44 4 t -44 -4 z" fill="#3a2718"/>
  <!-- Cork/rim -->
  <ellipse cx="80" cy="146" rx="40" ry="6" fill="#a13b2e"/>
  <ellipse cx="80" cy="144" rx="38" ry="5" fill="#7a2a23"/>
  <!-- Ink meniscus -->
  <ellipse cx="80" cy="148" rx="32" ry="4" fill="#1d1611"/>

  <!-- Quill -->
  <g transform="translate(86 30) rotate(20)">
    <!-- Shaft -->
    <path d="M 0 0 q 12 30 14 70 q 2 30 -2 50 l -4 4 q 0 -28 -8 -60 q -6 -22 -4 -64 z" fill="#fbf6ea" stroke="#3a2718" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Feather barbs -->
    <path d="M 4 6 q -8 -2 -14 4 m 14 8 q -10 -2 -16 6 m 16 10 q -10 -2 -16 6 m 16 14 q -12 -2 -18 6 m 18 14 q -12 0 -18 8 m 18 14 q -12 0 -18 8" stroke="#a13b2e" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Right side fewer barbs -->
    <path d="M 8 12 q 8 2 12 8 m -10 6 q 8 2 14 8 m -12 8 q 8 2 14 8" stroke="#4f5530" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Nib at tip -->
    <path d="M 10 122 q 4 4 6 12 q -1 4 -4 4 q -3 -2 -4 -10 z" fill="#1d1611"/>
    <line x1="13" y1="124" x2="14" y2="134" stroke="#c79046" stroke-width="0.8"/>
  </g>

  <!-- A drop of ink trailing down -->
  <circle cx="142" cy="186" r="3" fill="#1d1611"/>
  <ellipse cx="142" cy="200" rx="6" ry="2" fill="#1d1611" opacity="0.5"/>
</svg>
