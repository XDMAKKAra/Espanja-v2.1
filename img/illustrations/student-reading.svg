<?xml version="1.0" encoding="UTF-8"?>
<!--
  Puheo Ship 1.5 — Hero illustration. Humaaans-inspired flat figure of a
  student reading. Old-Spain palette (terracotta / olive / cream / gold).
  Editable: colors below are hex equivalents of OKLCH design tokens. Swap
  with literal Pablo Stanley Humaaans (MIT) figures later if desired.

  Tokens:
    cream     #f5efe2  bg
    terracotta #9B2D2A  primary (shirt)
    olive      #2E5E4E  secondary (trousers)
    gold       #D9A93B  marginalia (book spine, sun)
    ink        #1d1611  outline / hair
    skin-med   #E7B58C
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" role="img" aria-labelledby="title desc">
  <title id="title">Lukiolainen lukemassa kirjaa Mediterranean-iltavalossa</title>
  <desc id="desc">Flat illustration of a student seated on a stool, reading an open book, with a stack of books and a potted olive sprig beside them.</desc>

  <!-- Soft sun disc, flat WordDive yellow (no gradient) -->
  <circle cx="420" cy="120" r="62" fill="#F4C84A" opacity="0.9"/>
  <circle cx="420" cy="120" r="62" fill="none" stroke="#241C15" stroke-width="2" opacity="0.18"/>

  <!-- Distant arched window suggestion (terracotta line art) -->
  <path d="M 60 240 q 0 -50 50 -50 t 50 50 v 90 h -100 z" fill="none" stroke="#9B2D2A" stroke-width="2" opacity="0.22"/>

  <!-- Stool -->
  <rect x="200" y="470" width="170" height="22" rx="4" fill="#2E5E4E"/>
  <rect x="208" y="492" width="14" height="105" fill="#241C15"/>
  <rect x="348" y="492" width="14" height="105" fill="#241C15"/>

  <!-- Figure body — back/torso, terracotta shirt -->
  <path d="M 230 290
           q 40 -30 80 -28
           q 50 2 60 50
           l 6 130
           q -10 18 -36 22
           l -90 -2
           q -32 -6 -36 -28
           z"
        fill="#9B2D2A"/>

  <!-- Trousers (olive) -->
  <path d="M 230 458
           q 8 -12 30 -10
           l 100 0
           q 20 -2 26 12
           l -2 22
           q -10 8 -28 8
           l -98 0
           q -22 -2 -28 -10
           z"
        fill="#2E5E4E"/>

  <!-- Head (skin tone medium) -->
  <ellipse cx="296" cy="240" rx="46" ry="52" fill="#E7B58C"/>

  <!-- Hair (dark brown, tied back) -->
  <path d="M 252 226
           q -4 -36 24 -52
           q 20 -10 44 -6
           q 30 6 36 36
           q 4 18 -2 32
           q -8 -22 -34 -28
           q -22 -4 -36 4
           q -22 12 -32 14 z"
        fill="#241C15"/>
  <!-- Small bun -->
  <circle cx="246" cy="216" r="10" fill="#241C15"/>

  <!-- Neckline/collar shadow detail -->
  <path d="M 274 286 q 22 12 44 0 l -2 14 q -20 8 -40 0 z" fill="#7E2421" opacity="0.5"/>

  <!-- Far arm (resting on knee, terracotta sleeve) -->
  <path d="M 222 360 q -6 30 8 60 q 6 14 22 18 l 30 4" fill="none" stroke="#9B2D2A" stroke-width="32" stroke-linecap="round"/>
  <!-- Far hand -->
  <circle cx="282" cy="440" r="14" fill="#E7B58C"/>

  <!-- Near arm — holding book up -->
  <path d="M 380 320 q 20 18 14 48 q -2 16 -18 26 l -34 18" fill="none" stroke="#9B2D2A" stroke-width="32" stroke-linecap="round"/>
  <!-- Near hand -->
  <circle cx="338" cy="416" r="14" fill="#E7B58C"/>

  <!-- Open book (held in lap) -->
  <g transform="translate(244 388) rotate(-6)">
    <path d="M 0 0 q 60 -12 120 0 v 70 q -60 -12 -120 0 z" fill="#FFFFFF" stroke="#241C15" stroke-width="1.2"/>
    <line x1="60" y1="2" x2="60" y2="68" stroke="#241C15" stroke-width="1.5"/>
    <!-- Page lines suggestion -->
    <line x1="14" y1="20" x2="48" y2="16" stroke="#241C15" stroke-width="1" opacity="0.4"/>
    <line x1="14" y1="32" x2="50" y2="28" stroke="#241C15" stroke-width="1" opacity="0.4"/>
    <line x1="14" y1="44" x2="46" y2="42" stroke="#241C15" stroke-width="1" opacity="0.4"/>
    <line x1="72" y1="16" x2="106" y2="20" stroke="#241C15" stroke-width="1" opacity="0.4"/>
    <line x1="72" y1="28" x2="108" y2="32" stroke="#241C15" stroke-width="1" opacity="0.4"/>
    <line x1="72" y1="42" x2="104" y2="44" stroke="#241C15" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Stack of books beside stool -->
  <rect x="80" y="540" width="120" height="22" rx="2" fill="#2E5E4E"/>
  <rect x="86" y="518" width="108" height="22" rx="2" fill="#9B2D2A"/>
  <rect x="92" y="496" width="96" height="22" rx="2" fill="#D9A93B"/>
  <!-- Book spines -->
  <line x1="86" y1="522" x2="194" y2="522" stroke="#241C15" stroke-width="0.8" opacity="0.3"/>
  <line x1="80" y1="544" x2="200" y2="544" stroke="#241C15" stroke-width="0.8" opacity="0.3"/>

  <!-- Potted olive sprig (marginalia, far right) -->
  <rect x="430" y="540" width="50" height="40" rx="3" fill="#9B2D2A"/>
  <rect x="430" y="540" width="50" height="5" fill="#7E2421"/>
  <!-- Sprig -->
  <path d="M 455 540 q 0 -40 -22 -64 m 22 64 q 0 -50 24 -78" fill="none" stroke="#2E5E4E" stroke-width="2"/>
  <ellipse cx="438" cy="498" rx="9" ry="4" fill="#2E5E4E" transform="rotate(-30 438 498)"/>
  <ellipse cx="474" cy="478" rx="9" ry="4" fill="#2E5E4E" transform="rotate(30 474 478)"/>
  <ellipse cx="446" cy="514" rx="8" ry="3.5" fill="#2E5E4E" transform="rotate(-20 446 514)"/>
</svg>
