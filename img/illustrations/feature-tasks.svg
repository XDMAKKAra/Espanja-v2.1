<svg viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Oikea YO-koepaperi rastitettuna, espanjan, ranskan ja saksan aksenttitiilet">
  <!-- back paper -->
  <rect x="74" y="44" width="150" height="196" rx="16" fill="#FBEEC6" stroke="#241C15" stroke-width="3" transform="rotate(-5 149 142)"/>
  <!-- front exam sheet -->
  <rect x="92" y="40" width="150" height="200" rx="16" fill="#FFFFFF" stroke="#241C15" stroke-width="3"/>
  <!-- title bar -->
  <rect x="110" y="62" width="84" height="12" rx="6" fill="#9B2D2A"/>
  <!-- task rows with check badges -->
  <g>
    <circle cx="120" cy="104" r="11" fill="#2E5E4E"/>
    <path d="M115 104l4 4 7-8" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="138" y="98" width="80" height="9" rx="4.5" fill="#E9DFCF"/>
  </g>
  <g>
    <circle cx="120" cy="138" r="11" fill="#2E5E4E"/>
    <path d="M115 138l4 4 7-8" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="138" y="132" width="64" height="9" rx="4.5" fill="#E9DFCF"/>
  </g>
  <g>
    <circle cx="120" cy="172" r="11" fill="#F4C84A" stroke="#241C15" stroke-width="2.5"/>
    <rect x="138" y="166" width="72" height="9" rx="4.5" fill="#E9DFCF"/>
  </g>
  <rect x="138" y="200" width="50" height="9" rx="4.5" fill="#E9DFCF"/>

  <!-- accent tiles for the three languages, bottom edge -->
  <g>
    <rect x="36" y="196" width="48" height="48" rx="14" fill="#9B2D2A"/>
    <text x="60" y="230" font-family="Fredoka, sans-serif" font-weight="700" font-size="26" fill="#FFFFFF" text-anchor="middle">ñ</text>
  </g>
  <g>
    <rect x="236" y="172" width="48" height="48" rx="14" fill="#2E5E4E"/>
    <text x="260" y="206" font-family="Fredoka, sans-serif" font-weight="700" font-size="26" fill="#FFFFFF" text-anchor="middle">ç</text>
  </g>
  <g>
    <rect x="244" y="60" width="48" height="48" rx="14" fill="#F4C84A" stroke="#241C15" stroke-width="3"/>
    <text x="268" y="94" font-family="Fredoka, sans-serif" font-weight="700" font-size="26" fill="#241C15" text-anchor="middle">ß</text>
  </g>

  <!-- pencil -->
  <g transform="rotate(38 210 150)">
    <rect x="196" y="120" width="16" height="92" rx="6" fill="#F4C84A" stroke="#241C15" stroke-width="3"/>
    <path d="M196 212h16l-8 16Z" fill="#241C15"/>
    <rect x="196" y="120" width="16" height="14" rx="6" fill="#9B2D2A"/>
  </g>
</svg>
