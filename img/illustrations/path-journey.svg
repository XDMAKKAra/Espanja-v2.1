<?xml version="1.0" encoding="UTF-8"?>
<!--
  Puheo L-V346 — WordDive-palettin mukainen oppimispolku-kuvitus.
  Geometrinen, litteä, ei gradientteja, ei figuratiivisia käsiä (slop-riski).
  Motiivi: kiemurteleva polku, virstanpylväät (keltainen/vihreä), huipulla
  ylioppilaslakki + sparkle, aksenttitiilet ñ/é (espanja). Paletti lukittu:
  cream FBF7EF, paper FFFFFF, brick 9B2D2A, yellow F4C84A, green 2E5E4E,
  yellow-pale FBEEC6, green-pale DCE8E0, line E9DFCF, ink 241C15.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" role="img" aria-label="Oppimispolku virstanpylväineen ja ylioppilaslakkeineen">
  <!-- pale rounded backdrop blob -->
  <rect x="6" y="10" width="248" height="180" rx="34" fill="#FBEEC6"/>
  <circle cx="210" cy="48" r="40" fill="#DCE8E0"/>

  <!-- winding path (brick), rounded caps -->
  <path d="M 36 168 C 70 168 78 132 108 130 C 142 128 150 96 132 80 C 116 66 150 48 196 50"
        fill="none" stroke="#9B2D2A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- dashed center line on the path -->
  <path d="M 36 168 C 70 168 78 132 108 130 C 142 128 150 96 132 80 C 116 66 150 48 196 50"
        fill="none" stroke="#FBF7EF" stroke-width="2.4" stroke-linecap="round"
        stroke-dasharray="2 12" opacity="0.85"/>

  <!-- milestone 1 (start, green) -->
  <circle cx="36" cy="168" r="12" fill="#FFFFFF" stroke="#2E5E4E" stroke-width="4"/>
  <circle cx="36" cy="168" r="4" fill="#2E5E4E"/>
  <!-- milestone 2 (yellow) -->
  <circle cx="108" cy="130" r="12" fill="#F4C84A" stroke="#9B2D2A" stroke-width="3"/>
  <!-- milestone 3 (green) -->
  <circle cx="132" cy="80" r="11" fill="#2E5E4E"/>
  <path d="M 127 80 l 4 4 l 6 -8" fill="none" stroke="#FBF7EF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- summit: valkoinen ylioppilaslakki paperilaatalla (ei mortarboardia) -->
  <rect x="178" y="30" width="44" height="40" rx="12" fill="#FFFFFF" stroke="#E9DFCF" stroke-width="2"/>
  <!-- crown / kupoli -->
  <path d="M 185 52 C 185 40 191 36 200 36 C 209 36 215 40 215 52 Z" fill="#FFFFFF" stroke="#241C15" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- band / nauha -->
  <path d="M 183 52 H 217 V 56 Q 217 58 215 58 H 185 Q 183 58 183 56 Z" fill="#241C15"/>
  <!-- visor / lippa -->
  <path d="M 189 58 C 194 63 206 63 211 58 C 206 61 194 61 189 58 Z" fill="#241C15"/>
  <!-- gold lyre accent / lyyra -->
  <g stroke="#F4C84A" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M 197 56 C 195 51 197 48 200 48 C 203 48 205 51 203 56"/>
    <path d="M 199 49 V 56 M 201 49 V 56"/>
  </g>

  <!-- sparkle -->
  <path d="M 168 18 l 3 7 l 7 3 l -7 3 l -3 7 l -3 -7 l -7 -3 l 7 -3 z" fill="#F4C84A"/>

  <!-- accent tiles ñ / é (Spanish), bottom-right, flat -->
  <rect x="206" y="148" width="30" height="30" rx="9" fill="#FFFFFF" stroke="#E9DFCF" stroke-width="2"/>
  <text x="221" y="170" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#9B2D2A" text-anchor="middle">ñ</text>
  <rect x="170" y="158" width="28" height="28" rx="9" fill="#2E5E4E"/>
  <text x="184" y="179" font-family="Fredoka, sans-serif" font-size="16" font-weight="700" fill="#FBF7EF" text-anchor="middle">é</text>
</svg>
