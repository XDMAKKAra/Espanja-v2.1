<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
  body { background-color: #FBF7EF; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .soft-outline { border: 1px solid rgba(36, 28, 21, 0.1); }
  .accent-blob { background: #ffd253; border-radius: 45% 55% 70% 30% / 30% 60% 40% 70%; }

<body class="font-body-md text-on-surface bg-surface min-h-screen">
<!-- Sidebar: big logo block + Home/Exercises/Profile + Settings/Log out bottom -->
<!-- Home: bento grid — hero "Seuraava askel" (col-8) + countdown brick (col-4, big number) + progress (col-5) + Kielet (col-7) + Päivän vinkki + Yhteisö -->

<!-- Countdown widget -->
<section class="countdown bg-primary text-on-primary rounded-[1.5rem] p-md text-center">
  <p>Ylioppilaskokeeseen</p>
  <div class="font-display text-[64px] leading-none">42</div>
  <p>Päivää jäljellä</p>
  <div class="pill">Syksy 2026</div>
</section>

<!-- Hero next-step card -->
<section class="next bg-surface-container-lowest rounded-[1.5rem] p-md soft-outline">
  <span class="pill bg-tertiary-fixed">Seuraava askel</span>
  <h3 class="font-headline-md">Espanjan sanajärjestys</h3>
  <p>Jatka siitä mihin jäit.</p>
  <button class="bg-primary text-on-primary rounded-lg">Aloita harjoitus ▸</button>
</section>

<!-- Progress -->
<section class="progress rounded-[1.5rem] p-md soft-outline">
  <h3>Edistyminen</h3><span class="font-display">68%</span>
  <div class="track"><div class="fill" style="width:68%"></div></div>
  <div>Suoritetut moduulit 12/18 · Tämän viikon tavoite 85%</div>
</section>
