<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puheo hero v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7EF; --ink:#241C15; --ink-soft:#5C5145;
    --brick:#9B2D2A; --yellow:#F4C84A; --green:#2E5E4E;
    --yellow-pale:#FBEEC6; --green-pale:#DCE8E0; --brick-pale:#F4DAD3;
    --skin:#E7B58C; --skin-dk:#D29E72; --line:#E9DFCF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:"Mulish",system-ui,sans-serif;line-height:1.55}
  .display{font-family:"Fredoka",sans-serif;font-weight:700;letter-spacing:-.01em}
  .wrap{max-width:1180px;margin:0 auto;padding:0 32px}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
  .logo{font-family:"Fredoka",sans-serif;font-weight:700;font-size:28px;color:var(--brick)}
  .navlinks{display:flex;gap:28px;font-weight:600;font-size:15px}
  .navlinks a{color:var(--ink);text-decoration:none}
  .pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:13px 24px;font-weight:700;font-size:15.5px;border:none;cursor:pointer;font-family:"Fredoka",sans-serif;transition:transform .14s ease}
  .pill:active{transform:scale(.97)}
  .pill--brick{background:var(--brick);color:#fff}
  .pill--ghost{background:transparent;color:var(--ink);border:2px solid var(--ink)}

  .hero{display:grid;grid-template-columns:1fr 1.02fr;gap:40px;align-items:center;padding:30px 0 60px}
  .eyebrow{display:inline-block;background:var(--green-pale);color:var(--green);border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px;margin-bottom:20px}
  h1.display{font-size:60px;line-height:1.02;margin-bottom:18px}
  .hero p{font-size:19px;color:var(--ink-soft);max-width:34ch;margin-bottom:26px}
  .cta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .chips{margin-top:24px;display:flex;gap:9px;flex-wrap:wrap}
  .chip{background:#fff;border:2px solid var(--line);border-radius:999px;padding:8px 15px;font-weight:700;font-size:13.5px;font-family:"Fredoka",sans-serif}

  .art-panel{background:var(--yellow-pale);border-radius:36px;padding:26px;aspect-ratio:1/1;display:grid;place-items:center}
  .art-panel svg{width:100%;height:100%}

  @media(max-width:860px){
    .hero{grid-template-columns:1fr;gap:24px;padding:18px 0 40px}
    .navlinks{display:none}
    h1.display{font-size:42px}
    .art-panel{order:-1;aspect-ratio:4/3}
  }
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="logo">puheo</div>
    <div class="navlinks"><a>Kurssit</a><a>Arviointi</a><a>Hinta</a><a>UKK</a></div>
    <div style="display:flex;gap:10px">
      <button class="pill pill--ghost" style="padding:10px 18px">Kirjaudu</button>
      <button class="pill pill--brick" style="padding:10px 18px">Aloita</button>
    </div>
  </nav>

  <section class="hero">
    <div>
      <span class="eyebrow">Lyhyt espanja · ranska · saksa</span>
      <h1 class="display">Selätä lyhyen kielen YO.</h1>
      <p>Harjoittele oikeita YO-tehtäviä ja anna tekoälyn arvioida kirjoitelmasi heti, samalla mittarilla kuin kokeessa.</p>
      <div class="cta">
        <button class="pill pill--brick">Tee ilmainen tasotesti</button>
        <button class="pill pill--ghost">Miten arviointi toimii</button>
      </div>
      <div class="chips">
        <span class="chip">Lyhyt oppimäärä</span>
        <span class="chip">YTL-rubriikki</span>
        <span class="chip">Ilmainen aloitus</span>
      </div>
    </div>

    <div class="art-panel">
      <!-- Cleaner flat illustration: hand holds phone (AI grade) + 3 language speech bubbles (ES/FR/DE). -->
      <svg viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Käsi pitelee puhelinta jossa tekoäly arvioi kirjoitelman; espanja, ranska ja saksa">
        <!-- one soft backdrop blob, centered behind phone -->
        <circle cx="262" cy="250" r="160" fill="#DCE8E0"/>

        <!-- 3 language speech bubbles, balanced around the edges -->
        <!-- ES top-left -->
        <g>
          <rect x="26" y="120" width="118" height="56" rx="22" fill="#fff" stroke="#241C15" stroke-width="3"/>
          <path d="M60 174l-4 22 24-16Z" fill="#fff" stroke="#241C15" stroke-width="3"/>
          <text x="85" y="156" font-family="Fredoka, sans-serif" font-weight="600" font-size="23" fill="#9B2D2A" text-anchor="middle">¡Hola!</text>
        </g>
        <!-- FR top-right -->
        <g>
          <rect x="372" y="96" width="118" height="56" rx="22" fill="#fff" stroke="#241C15" stroke-width="3"/>
          <path d="M452 150l8 22-26-14Z" fill="#fff" stroke="#241C15" stroke-width="3"/>
          <text x="431" y="132" font-family="Fredoka, sans-serif" font-weight="600" font-size="23" fill="#2E5E4E" text-anchor="middle">Salut!</text>
        </g>
        <!-- DE mid-right -->
        <g>
          <rect x="378" y="300" width="116" height="56" rx="22" fill="#F4C84A" stroke="#241C15" stroke-width="3"/>
          <path d="M404 354l-6 22 22-14Z" fill="#F4C84A" stroke="#241C15" stroke-width="3"/>
          <text x="436" y="336" font-family="Fredoka, sans-serif" font-weight="600" font-size="23" fill="#241C15" text-anchor="middle">Hallo!</text>
        </g>

        <!-- sparkle -->
        <path d="M150 96l7 18 18 7-18 7-7 18-7-18-18-7 18-7Z" fill="#F4C84A"/>

        <!-- phone -->
        <g transform="rotate(-3 262 270)">
          <rect x="182" y="120" width="178" height="300" rx="34" fill="#241C15"/>
          <rect x="194" y="132" width="154" height="276" rx="24" fill="#FBF7EF"/>
          <!-- header line -->
          <rect x="210" y="156" width="86" height="14" rx="7" fill="#E9DFCF"/>
          <!-- grade card -->
          <rect x="210" y="186" width="122" height="120" rx="18" fill="#fff" stroke="#E9DFCF" stroke-width="2"/>
          <text x="228" y="236" font-family="Fredoka, sans-serif" font-weight="700" font-size="40" fill="#9B2D2A">27</text>
          <text x="276" y="236" font-family="Mulish, sans-serif" font-weight="600" font-size="15" fill="#5C5145">/33</text>
          <circle cx="310" cy="220" r="17" fill="#2E5E4E"/>
          <text x="310" y="226" font-family="Fredoka, sans-serif" font-weight="700" font-size="17" fill="#fff" text-anchor="middle">C</text>
          <rect x="226" y="262" width="90" height="9" rx="4" fill="#DCE8E0"/>
          <rect x="226" y="262" width="72" height="9" rx="4" fill="#2E5E4E"/>
          <rect x="226" y="280" width="90" height="9" rx="4" fill="#FBEEC6"/>
          <rect x="226" y="280" width="54" height="9" rx="4" fill="#F4C84A"/>
          <!-- CTA bar -->
          <rect x="210" y="324" width="122" height="34" rx="17" fill="#9B2D2A"/>
          <rect x="244" y="338" width="54" height="6" rx="3" fill="#fff" opacity=".9"/>
        </g>

        <!-- clean hand: palm behind phone bottom + one thumb wrapping front -->
        <g>
          <!-- wrist -->
          <path d="M210 452h104c6 26 2 54-16 64H226c-18-10-22-38-16-64Z" fill="#D29E72"/>
          <!-- palm -->
          <ellipse cx="262" cy="446" rx="92" ry="40" fill="#E7B58C"/>
          <!-- thumb wrapping over the phone front-left -->
          <path d="M214 432c-6-30-2-66 2-86 3-14 24-12 24 3-1 22-1 46 1 64Z" fill="#E7B58C"/>
          <path d="M214 432c-6-30-2-66 2-86" stroke="#D29E72" stroke-width="3" fill="none" opacity=".55"/>
        </g>
      </svg>
    </div>
  </section>
</div>
</body>
</html>
