<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puheo hero v2 — illustration-led</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7EF; --ink:#241C15; --ink-soft:#5C5145;
    --brick:#9B2D2A; --yellow:#F4C84A; --green:#2E5E4E;
    --yellow-pale:#FBEEC6; --green-pale:#DCE8E0; --brick-pale:#F4DAD3;
    --skin:#E7B58C; --line:#E9DFCF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:"Mulish",system-ui,sans-serif;line-height:1.55}
  .display{font-family:"Fredoka",sans-serif;font-weight:700;letter-spacing:-.01em}
  .wrap{max-width:1180px;margin:0 auto;padding:0 32px}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
  .logo{font-family:"Fredoka",sans-serif;font-weight:700;font-size:28px;color:var(--brick)}
  .navlinks{display:flex;gap:28px;font-weight:600;font-size:15px}
  .navlinks a{color:var(--ink);text-decoration:none}
  .pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:13px 24px;font-weight:700;font-size:15.5px;border:none;cursor:pointer;font-family:"Fredoka",sans-serif;transition:transform .14s ease}
  .pill:active{transform:scale(.97)}
  .pill--brick{background:var(--brick);color:#fff}
  .pill--ghost{background:transparent;color:var(--ink);border:2px solid var(--ink)}
  .pill--yellow{background:var(--yellow);color:var(--ink)}

  .hero{display:grid;grid-template-columns:1fr 1.02fr;gap:40px;align-items:center;padding:34px 0 60px}
  .eyebrow{display:inline-block;background:var(--green-pale);color:var(--green);border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px;margin-bottom:20px}
  h1.display{font-size:60px;line-height:1.02;margin-bottom:18px}
  .hero p{font-size:19px;color:var(--ink-soft);max-width:34ch;margin-bottom:26px}
  .cta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .chips{margin-top:24px;display:flex;gap:9px;flex-wrap:wrap}
  .chip{background:#fff;border:2px solid var(--line);border-radius:999px;padding:8px 15px;font-weight:700;font-size:13.5px;font-family:"Fredoka",sans-serif}

  .art-panel{background:var(--yellow-pale);border-radius:36px;padding:18px;aspect-ratio:1/1;display:grid;place-items:center}
  .art-panel svg{width:100%;height:100%}

  @media(max-width:860px){
    .hero{grid-template-columns:1fr;gap:24px;padding:18px 0 40px}
    .navlinks{display:none}
    h1.display{font-size:42px}
    .art-panel{order:-1;aspect-ratio:4/3}
  }
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="logo">puheo</div>
    <div class="navlinks"><a>Kurssit</a><a>Arviointi</a><a>Hinta</a><a>UKK</a></div>
    <div style="display:flex;gap:10px">
      <button class="pill pill--ghost" style="padding:10px 18px">Kirjaudu</button>
      <button class="pill pill--brick" style="padding:10px 18px">Aloita</button>
    </div>
  </nav>

  <section class="hero">
    <div>
      <span class="eyebrow">Lyhyt espanja · ranska · saksa</span>
      <h1 class="display">Selätä lyhyen kielen YO.</h1>
      <p>Harjoittele oikeita YO-tehtäviä ja anna tekoälyn arvioida kirjoitelmasi heti, samalla mittarilla kuin kokeessa.</p>
      <div class="cta">
        <button class="pill pill--brick">Tee ilmainen tasotesti</button>
        <button class="pill pill--ghost">Miten arviointi toimii</button>
      </div>
      <div class="chips">
        <span class="chip">Lyhyt oppimäärä</span>
        <span class="chip">YTL-rubriikki</span>
        <span class="chip">Ilmainen aloitus</span>
      </div>
    </div>

    <div class="art-panel">
      <!-- Custom flat illustration: hand holding phone (WordDive motif) + language ephemera. All flat, no gradients. -->
      <svg viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Käsi pitelee puhelinta jossa tekoäly arvioi kirjoitelman">
        <!-- background organic blobs -->
        <path d="M120 90c70-46 196-30 234 34 36 60 6 150-58 184-66 35-176 26-214-40-36-62-22-138 38-178Z" fill="#F8E3A8"/>
        <circle cx="402" cy="132" r="40" fill="#DCE8E0"/>
        <circle cx="96" cy="350" r="30" fill="#F4DAD3"/>

        <!-- floating language tiles -->
        <g>
          <rect x="60" y="150" width="62" height="62" rx="18" fill="#2E5E4E"/>
          <text x="91" y="193" font-family="Fredoka, sans-serif" font-weight="700" font-size="30" fill="#fff" text-anchor="middle">ñ</text>
        </g>
        <g>
          <rect x="396" y="300" width="56" height="56" rx="16" fill="#9B2D2A"/>
          <text x="424" y="339" font-family="Fredoka, sans-serif" font-weight="700" font-size="28" fill="#fff" text-anchor="middle">á</text>
        </g>

        <!-- speech bubble -->
        <g>
          <rect x="330" y="78" width="120" height="58" rx="22" fill="#fff" stroke="#241C15" stroke-width="3"/>
          <path d="M360 134l-6 22 26-16Z" fill="#fff" stroke="#241C15" stroke-width="3"/>
          <text x="390" y="115" font-family="Fredoka, sans-serif" font-weight="600" font-size="24" fill="#9B2D2A" text-anchor="middle">¡Hola!</text>
        </g>

        <!-- phone -->
        <g transform="rotate(-4 260 290)">
          <rect x="170" y="120" width="180" height="320" rx="34" fill="#241C15"/>
          <rect x="182" y="132" width="156" height="296" rx="24" fill="#FBF7EF"/>
          <!-- screen content: chat line -->
          <rect x="198" y="156" width="92" height="16" rx="8" fill="#E9DFCF"/>
          <rect x="198" y="180" width="124" height="14" rx="7" fill="#EFE6D6"/>
          <!-- grade result card -->
          <rect x="198" y="214" width="124" height="120" rx="18" fill="#fff" stroke="#E9DFCF" stroke-width="2"/>
          <text x="218" y="262" font-family="Fredoka, sans-serif" font-weight="700" font-size="40" fill="#9B2D2A">27</text>
          <text x="266" y="262" font-family="Mulish, sans-serif" font-weight="600" font-size="15" fill="#5C5145">/33</text>
          <circle cx="300" cy="248" r="17" fill="#2E5E4E"/>
          <text x="300" y="254" font-family="Fredoka, sans-serif" font-weight="700" font-size="17" fill="#fff" text-anchor="middle">C</text>
          <rect x="214" y="288" width="92" height="9" rx="4" fill="#DCE8E0"/>
          <rect x="214" y="288" width="74" height="9" rx="4" fill="#2E5E4E"/>
          <rect x="214" y="306" width="92" height="9" rx="4" fill="#FBEEC6"/>
          <rect x="214" y="306" width="58" height="9" rx="4" fill="#F4C84A"/>
          <!-- CTA bar on screen -->
          <rect x="198" y="350" width="124" height="34" rx="17" fill="#9B2D2A"/>
          <rect x="232" y="364" width="56" height="6" rx="3" fill="#fff" opacity=".9"/>
        </g>

        <!-- hand holding phone from bottom -->
        <g>
          <path d="M196 470c-14-26-20-58-16-92 2-18 26-20 30-2 4 20 8 34 14 44 0-30 2-66 4-86 2-16 26-16 28 0 2 22 2 52 2 76 4-22 8-50 12-68 3-15 27-12 26 4-2 26-4 52-6 74 8-14 16-30 22-40 8-13 28-2 22 12-12 28-22 52-34 72-10 16-22 28-40 34-40 13-78 6-100-22Z" fill="#E7B58C"/>
          <path d="M196 470c-14-26-20-58-16-92" stroke="#C9966B" stroke-width="3" fill="none" opacity=".5"/>
        </g>

        <!-- sparkle + checkmark badge -->
        <path d="M140 96l6 16 16 6-16 6-6 16-6-16-16-6 16-6Z" fill="#F4C84A"/>
        <g>
          <circle cx="430" cy="220" r="22" fill="#2E5E4E"/>
          <path d="M420 220l7 7 13-15" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>
  </section>
</div>
</body>
</html>
