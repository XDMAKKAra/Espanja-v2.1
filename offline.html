<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puheo, Ei yhteyttä</title>
  <link rel="stylesheet" href="/css/fonts.css" />
  <style>
    body { background: #FBF7EF; color: #241C15; font-family: "Mulish", system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; }
    .offline-box { max-width: 400px; }
    h1 { font-size: 2rem; margin-bottom: 12px; font-family: "Fredoka", system-ui, sans-serif; font-weight: 700; }
    p { color: #5C5145; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn { background: #9B2D2A; color: #fff; border: none; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: "Fredoka", system-ui, sans-serif; }
    .btn:active { transform: scale(.97); }
    .btn:hover { background: #832421; }
    .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="offline-box">
    <div class="icon">📡</div>
    <h1>Ei yhteyttä</h1>
    <p>Tarkista internet-yhteytesi ja yritä uudelleen. Harjoitukset vaativat verkkoyhteyden tekoälyn generoimien tehtävien vuoksi.</p>
    <button class="btn" onclick="location.reload()">Yritä uudelleen</button>
  </div>
</body>
</html>
