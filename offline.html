<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kielio — Ei yhteyttä</title>
  <style>
    body { background: #0c0808; color: #f5e8e0; font-family: 'Syne', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; }
    .offline-box { max-width: 400px; }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { color: #9e7a7a; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn { background: #e63946; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #c62020; }
    .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="offline-box">
    <div class="icon">📡</div>
    <h1>Ei yhteyttä</h1>
    <p>Tarkista internet-yhteytesi ja yritä uudelleen. Harjoitukset vaativat verkkoyhteyden tekoälyn generoimien tehtävien vuoksi.</p>
    <button class="btn" onclick="location.reload()">Yritä uudelleen</button>
  </div>
</body>
</html>
